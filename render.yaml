services:
  - type: web
    name: legacy-spirits-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false        # paste your BotFather token in the Render dashboard
      - key: MAHESH_CHAT_ID
        sync: false        # add after you run /myid in the bot
      - key: ALLOWED_USER_IDS
        sync: false        # optional, comma-separated; leave blank to allow anyone
